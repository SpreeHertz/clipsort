<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ClipSort — Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root { --footer-text: rgb(191,191,191); }
::-webkit-scrollbar { display: none; }
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Geist', sans-serif; outline: none; }
html, body { background: #000; color: #fff; height: 100%; }

.root {
  background: #000;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  overflow-y: auto;
}

/* VIDEO WRAP */
.video-wrap { position: relative; width: 100%; background: #111; }
.video-el { width: 100%; height: auto; display: block; }

/* OVERLAY */
.overlay {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 120px 28px 75px;
  background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.4) 40%, transparent 100%);
  pointer-events: none;
  z-index: 5;
}
.overlay-title {
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.02em;
  margin-bottom: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.overlay-meta { display: flex; flex-direction: column; gap: 2px; }
.counter { font-size: 13px; font-weight: 400; color: rgba(255,255,255,0.5); }
.counter-sep { color: rgba(255,255,255,0.25); margin: 0 3px; }

/* CONTROLS ROW */
.controls-row {
  position: absolute;
  bottom: 6px;
  left: 16px;
  right: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  z-index: 10;
  pointer-events: all;
}

.progress-section { width: 100%; display: flex; flex-direction: column; gap: 4px; }

.progress-timestamps {
  display: flex;
  justify-content: space-between;
  padding: 0 2px;
}
.duration-label { font-size: 11px; font-weight: 300; color: rgba(235, 234, 234, 0.781); font-variant-numeric: tabular-nums; }

.progress-bar {
  position: relative;
  width: 100%;
  height: 4px;
  background: rgba(255,255,255,0.15);
  cursor: pointer;
  border-radius: 9px;
  transition: height 0.15s;
}
.progress-bar:hover { height: 6px; }
.progress-fill {
  height: 100%;
  width: 35%;
  background: #fff;
  border-radius: 9px;
  pointer-events: none;
  transition: width 0.4s linear;
}

/* scrub popup */
.scrub-popup {
  position: absolute;
  bottom: 16px;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  pointer-events: none;
}
.scrub-thumb {
  width: 160px;
  height: 90px;
  object-fit: cover;
  border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.15);
  background: #222;
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(255,255,255,0.3);
  font-size: 11px;
}
.scrub-time {
  font-size: 11px;
  font-weight: 500;
  color: #fff;
  font-variant-numeric: tabular-nums;
  background: rgba(0,0,0,0.6);
  padding: 2px 6px;
  border-radius: 4px;
}

/* TRANSPORT */
.transport-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 24px;
  pointer-events: all;
}
.tbtn {
  background: none;
  border: none;
  color: rgba(255,255,255,0.7);
  cursor: pointer;
  padding: 0;
  display: flex;
  align-items: center;
  transition: color 0.12s;
}
.tbtn:hover { color: #fff; }
.tbtn.main { color: #fff; }
.tbtn.main:hover { color: rgba(255,255,255,0.6); }

/* ACTION BAR */
.action-bar {
  background: #111;
  border-top: 0.5px solid rgba(255,255,255,0.07);
  padding: 11px 24px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.rename-field {
  flex: 1;
  background: rgba(255,255,255,0.06);
  border: 0.5px solid rgba(255,255,255,0.1);
  border-radius: 7px;
  padding: 8px 14px;
  font-size: 13px;
  color: #fff;
  outline: none;
  transition: border-color 0.15s;
}
.rename-field::placeholder { color: rgba(255,255,255,0.2); }
.rename-field:focus { border-color: rgba(255,255,255,0.3); }
.abar-btn {
  padding: 8px 16px;
  font-size: 12px;
  font-weight: 500;
  border-radius: 7px;
  border: 0.5px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.65);
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.12s;
}
.abar-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
.abar-btn.del { color: rgba(255,80,60,0.7); border-color: rgba(255,80,60,0.18); }
.abar-btn.del:hover { background: rgba(255,80,60,0.1); color: rgb(255,80,60); }
.divider { width: 0.5px; height: 20px; background: rgba(255,255,255,0.08); flex-shrink: 0; }

input::-webkit-outer-spin-button,
input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

.skip-row { display: flex; align-items: center; gap: 8px; flex-shrink: 0; margin-left: 4px; }
.skip-label { font-size: 11px; color: rgba(255,255,255,0.3); white-space: nowrap; }
.skip-num {
  width: 54px;
  background: rgba(255,255,255,0.06);
  border: 0.5px solid rgba(255,255,255,0.1);
  border-radius: 5px;
  padding: 4px 6px;
  font-size: 12px;
  color: #fff;
  outline: none;
  text-align: center;
}
.toggle-wrap {
  width: 30px; height: 17px;
  background: #30d158;
  border-radius: 9px;
  position: relative;
  cursor: pointer;
  transition: background 0.2s;
  flex-shrink: 0;
}
.toggle-wrap.off { background: rgba(255,255,255,0.15); }
.toggle-knob {
  width: 13px; height: 13px;
  background: #fff;
  border-radius: 50%;
  position: absolute;
  top: 2px; right: 2px;
  transition: all 0.2s;
}
.toggle-wrap.off .toggle-knob { right: auto; left: 2px; }

/* BOTTOM ROW */
.bottom-row {
  display: flex;
  align-items: flex-start;
  padding: 14px 24px;
  gap: 14px;
  background: #0a0a0a;
  flex: 1;
}
.queue-card {
  width: 240px;
  background: #161616;
  border: 0.5px solid rgba(255,255,255,0.07);
  border-radius: 10px;
  overflow: hidden;
  flex-shrink: 0;
}
.queue-header {
  padding: 9px 14px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.28);
  border-bottom: 0.5px solid rgba(255,255,255,0.06);
  display: flex;
  justify-content: space-between;
}
.queue-list { max-height: 200px; overflow-y: auto; }
.queue-list::-webkit-scrollbar { width: 3px; display: block; }
.queue-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
.queue-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 14px;
  border-bottom: 0.5px solid rgba(255,255,255,0.04);
  cursor: pointer;
  transition: background 0.1s;
}
.queue-item:hover { background: rgba(255,255,255,0.03); }
.queue-item.now { background: rgba(255,255,255,0.05); }
.queue-item:last-child { border-bottom: none; }
.q-thumb {
  position: relative;
  width: 44px; height: 27px;
  background: rgba(255,255,255,0.06);
  border-radius: 4px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.q-info { flex: 1; min-width: 0; }
.q-name {
  font-size: 11px;
  font-weight: 500;
  color: rgba(255,255,255,0.5);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.queue-item.now .q-name { color: #fff; }

.hint-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 20px;
  padding-top: 4px;
}
.hint { font-size: 11px; color: var(--footer-text); font-weight: 300; display: flex; align-items: center; gap: 5px; }
.kbd {
  background: rgba(255,255,255,0.07);
  border: 0.5px solid rgba(255,255,255,0.1);
  border-radius: 4px;
  padding: 2px 7px;
  font-size: 11px;
  color: rgba(255,255,255,0.32);
}
.alert-card {
  position: absolute;
  top: 16px;
  right: 16px;
  z-index: 20;
  background: rgba(132, 132, 132, 0.548);
  color: #fff;
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 16px;
  backdrop-filter: blur(600px);
  -webkit-backdrop-filter: blur(200px);
}
/* scrub popup placeholder box */
.scrub-thumb-placeholder {
  width: 160px;
  height: 90px;
  border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.15);
  background: #1a1a1a;
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(255,255,255,0.25);
  font-size: 10px;
  backdrop-filter: blur(6px);
}
</style>
</head>
<body>

<div class="root">
  <div class="video-wrap">
    <div class="alert-card">video deleted successfully</div>
    <!-- mock video: plain colored box with aspect ratio -->
    <div style="width:100%;aspect-ratio:16/9;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);display:flex;align-items:center;justify-content:center;">
      <span style="color:rgba(255,255,255,0.08);font-size:13px;letter-spacing:0.1em;text-transform:uppercase;">video preview</span>
    </div>

    <!-- overlay -->
    <div class="overlay">
      <div class="overlay-title">Minecraft 2023.04.18 - 23.36.06.14.DVR</div>
      <div class="overlay-meta">
        <span class="counter">382<span class="counter-sep">/</span>395</span>
      </div>
    </div>

    <!-- controls -->
    <div class="controls-row">
      <div class="progress-section">
        <div class="progress-timestamps">
          <span class="duration-label">0:13</span>
          <span class="duration-label">0:30</span>
        </div>
        <div class="progress-bar" id="progressBar">
          <div class="progress-fill" id="progressFill"></div>
          <div class="scrub-popup" id="scrubPopup" style="display:none; left:0">
            <div class="scrub-thumb-placeholder">thumbnail</div>
            <span class="scrub-time" id="scrubTime">0:00</span>
          </div>
        </div>
      </div>

      <div class="transport-row">
        <button class="tbtn" id="btnPrev">
          <svg width="18" height="18" viewBox="0 0 32 28" xmlns="http://www.w3.org/2000/svg">
            <path transform="scale(-1,1) translate(-32,0)" d="M18.14 20.68c.365 0 .672-.107 1.038-.323l8.508-4.997c.623-.365.938-.814.938-1.37 0-.564-.307-.988-.938-1.361l-8.508-4.997c-.366-.216-.68-.324-1.046-.324-.73 0-1.337.556-1.337 1.569v4.773c-.108-.399-.406-.73-.904-1.021L7.382 7.632c-.357-.216-.672-.324-1.037-.324-.73 0-1.345.556-1.345 1.569v10.235c0 1.013.614 1.569 1.345 1.569.365 0 .68-.108 1.037-.324l8.509-4.997c.49-.29.796-.631.904-1.038v4.79c0 1.013.615 1.569 1.345 1.569z" fill="currentColor" fill-rule="nonzero"/>
          </svg>
        </button>
        <button class="tbtn main" id="btnPlay">
          <svg id="iconPlay" width="22" height="22" viewBox="0 0 22 22" fill="none">
            <path d="M7 4l12 7-12 7V4z" fill="currentColor"/>
          </svg>
          <svg id="iconPause" width="22" height="22" viewBox="0 0 22 22" fill="none" style="display:none">
            <rect x="5" y="4" width="4" height="14" rx="1" fill="currentColor"/>
            <rect x="13" y="4" width="4" height="14" rx="1" fill="currentColor"/>
          </svg>
        </button>
        <button class="tbtn" id="btnNext">
          <svg width="18" height="18" viewBox="0 0 32 28" xmlns="http://www.w3.org/2000/svg">
            <path d="M18.14 20.68c.365 0 .672-.107 1.038-.323l8.508-4.997c.623-.365.938-.814.938-1.37 0-.564-.307-.988-.938-1.361l-8.508-4.997c-.366-.216-.68-.324-1.046-.324-.73 0-1.337.556-1.337 1.569v4.773c-.108-.399-.406-.73-.904-1.021L7.382 7.632c-.357-.216-.672-.324-1.037-.324-.73 0-1.345.556-1.345 1.569v10.235c0 1.013.614 1.569 1.345 1.569.365 0 .68-.108 1.037-.324l8.509-4.997c.49-.29.796-.631.904-1.038v4.79c0 1.013.615 1.569 1.345 1.569z" fill="currentColor" fill-rule="nonzero"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- ACTION BAR -->
  <div class="action-bar">
    <input class="rename-field" value="Minecraft 2023.04.18 - 23.36.06.14.DVR" placeholder="rename clip…" />
    <button class="abar-btn">Rename</button>
    <div class="divider"></div>
    <button class="abar-btn del">Delete</button>
    <div class="divider"></div>
    <div class="skip-row">
      <span class="skip-label">Last</span>
      <input class="skip-num" type="number" value="10" min="1" />
      <span class="skip-label">seconds</span>
      <div class="toggle-wrap off" id="skipToggle">
        <div class="toggle-knob"></div>
      </div>
    </div>
    <div class="divider"></div>
    <button class="abar-btn">Change Folder</button>
  </div>

  <!-- BOTTOM ROW -->
  <div class="bottom-row">
    <div class="queue-card">
      <div class="queue-header">
        <span>Queue</span>
        <span>382 / 395</span>
      </div>
      <div class="queue-list" id="queueList"></div>
    </div>

    <div class="hint-area">
      <span class="hint"><span class="kbd">←</span><span class="kbd">→</span> navigate</span>
      <span class="hint"><span class="kbd">Space</span> play/pause</span>
      <span class="hint"><span class="kbd">↵</span> rename & next</span>
      <span class="hint"><span class="kbd">Del</span> delete (permanent)</span>
    </div>
  </div>
</div>

<script>
  // ── Mock data ──────────────────────────────────────────────────────────────
  const clips = [
    'Minecraft 2023.04.18 - 23.36.06.14.DVR',
    'airdropping parcel',
    'hello world',
    'late night paatpaadaling',
    'Minecraft 2023.04.21 - 12.39.31',
    'Minecraft 2023.04.21 - 12.42.24',
    'Minecraft 2023.05.06 - 13.47.37',
    'Minecraft 2023.05.17 - 18.05.27',
    'clutch moment',
    'base tour final',
  ]
  let currentIndex = 0
  let playing = false
  let progress = 0.35
  let progressInterval = null

  // ── Queue ──────────────────────────────────────────────────────────────────
  function renderQueue() {
    const list = document.getElementById('queueList')
    list.innerHTML = clips.map((name, i) => `
      <div class="queue-item ${i === currentIndex ? 'now' : ''}" onclick="goTo(${i})">
        <div class="q-thumb">
          ${i === currentIndex ? `<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 1l7 4-7 4V1z" fill="rgba(255,255,255,0.6)"/></svg>` : ''}
        </div>
        <div class="q-info">
          <div class="q-name">${name}</div>
        </div>
      </div>
    `).join('')
  }

  function goTo(i) {
    currentIndex = i
    progress = 0
    document.getElementById('progressFill').style.width = '0%'
    document.querySelector('.overlay-title').textContent = clips[i]
    document.querySelector('.rename-field').value = clips[i]
    renderQueue()
    if (playing) startProgress()
  }

  // ── Play/pause mock ────────────────────────────────────────────────────────
  function togglePlay() {
    playing = !playing
    document.getElementById('iconPlay').style.display = playing ? 'none' : 'block'
    document.getElementById('iconPause').style.display = playing ? 'block' : 'none'
    if (playing) startProgress()
    else clearInterval(progressInterval)
  }

  function startProgress() {
    clearInterval(progressInterval)
    progressInterval = setInterval(() => {
      progress = Math.min(progress + 0.005, 1)
      document.getElementById('progressFill').style.width = (progress * 100) + '%'
      const total = 30
      const cur = Math.floor(progress * total)
      document.querySelector('.duration-label').textContent = formatTime(cur)
      if (progress >= 1) {
        clearInterval(progressInterval)
        playing = false
        document.getElementById('iconPlay').style.display = 'block'
        document.getElementById('iconPause').style.display = 'none'
      }
    }, 100)
  }

  function formatTime(s) {
    const m = Math.floor(s / 60)
    const sec = Math.floor(s % 60).toString().padStart(2, '0')
    return `${m}:${sec}`
  }

  // ── Progress bar hover ─────────────────────────────────────────────────────
  const bar = document.getElementById('progressBar')
  const popup = document.getElementById('scrubPopup')
  const scrubTimeEl = document.getElementById('scrubTime')

  bar.addEventListener('mousemove', (e) => {
    const rect = bar.getBoundingClientRect()
    const x = e.clientX - rect.left
    const pct = x / rect.width
    const time = Math.floor(pct * 30)
    scrubTimeEl.textContent = formatTime(time)
    popup.style.left = x + 'px'
    popup.style.display = 'flex'
  })

  bar.addEventListener('mouseleave', () => {
    popup.style.display = 'none'
  })

  bar.addEventListener('click', (e) => {
    const rect = bar.getBoundingClientRect()
    progress = (e.clientX - rect.left) / rect.width
    document.getElementById('progressFill').style.width = (progress * 100) + '%'
  })

  // ── Buttons ────────────────────────────────────────────────────────────────
  document.getElementById('btnPlay').addEventListener('click', togglePlay)
  document.getElementById('btnNext').addEventListener('click', () => goTo(Math.min(currentIndex + 1, clips.length - 1)))
  document.getElementById('btnPrev').addEventListener('click', () => goTo(Math.max(currentIndex - 1, 0)))

  document.getElementById('skipToggle').addEventListener('click', function() {
    this.classList.toggle('off')
  })

  // ── Keyboard ───────────────────────────────────────────────────────────────
  document.addEventListener('keydown', (e) => {
    if (document.activeElement?.classList.contains('rename-field')) return
    if (e.code === 'Space') { e.preventDefault(); togglePlay() }
    if (e.key === 'ArrowRight') goTo(Math.min(currentIndex + 1, clips.length - 1))
    if (e.key === 'ArrowLeft') goTo(Math.max(currentIndex - 1, 0))
  })

  // ── Init ───────────────────────────────────────────────────────────────────
  renderQueue()
</script>
</body>
</html>
